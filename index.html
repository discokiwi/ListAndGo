<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>List&GO – Grocery & Meal Planner</title>
  <meta name="description" content="A local‑first, offline‑first PWA for managing grocery lists and meal planning." />
  <meta name="theme-color" content="#f9f9fc" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <!-- Design Tokens & Base Styles -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />

  <!-- Component Styles -->
  <link rel="stylesheet" href="css/components/badge.css" />
  <link rel="stylesheet" href="css/components/bottom-sheet.css" />
  <link rel="stylesheet" href="css/components/fab.css" />
  <link rel="stylesheet" href="css/components/inputs.css" />
  <link rel="stylesheet" href="css/components/grocery-row.css" />

  <link rel="manifest" href="manifest.webmanifest" />
</head>
<body>
  <div class="app-shell">
    <!-- ============================================= -->
    <!-- Bottom Navigation                             -->
    <!-- ============================================= -->
    <nav class="app-nav" id="app-nav">
      <a href="#/lists" data-route="lists" aria-current="page">
        <svg width="24" height="24" viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-1.99.9-1.99 2S15.9 22 17 22s2-.9 2-2-.9-2-2-2zm-8.9-5h7.45c.75 0 1.41-.41 1.75-1.03L21 4.96 19.25 4l-3.7 7H8.53L4.27 2H1v2h2l3.6 7.59-1.35 2.44C4.52 15.37 5.48 17 7 17h12v-2H7l1.1-2z"/></svg>
        <span>Lists</span>
      </a>
      <a href="#/plan" data-route="plan">
        <svg width="24" height="24" viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>
        <span>Plan</span>
      </a>
      <a href="#/recipes" data-route="recipes">
        <svg width="24" height="24" viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9h-4v4h-2v-4H9V9h4V5h2v4h4v2z"/></svg>
        <span>Recipes</span>
      </a>
      <a href="#/items" data-route="items">
        <svg width="24" height="24" viewBox="0 0 24 24"><path d="M12 22c4.97 0 9-4.03 9-9-4.97 0-9 4.03-9 9zM5.6 10.25c0 1.38 1.12 2.5 2.5 2.5.53 0 1.01-.16 1.42-.44l-.02.19c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5l-.02-.19c.4.28.89.44 1.42.44 1.38 0 2.5-1.12 2.5-2.5 0-1-.59-1.85-1.43-2.25.84-.4 1.43-1.25 1.43-2.25 0-1.38-1.12-2.5-2.5-2.5-.53 0-1.01.16-1.42.44l.02-.19C14.5 2.12 13.38 1 12 1S9.5 2.12 9.5 3.5l.02.19c-.4-.28-.89-.44-1.42-.44-1.38 0-2.5 1.12-2.5 2.5 0 1 .59 1.85 1.43 2.25-.84.4-1.43 1.25-1.43 2.25zM12 5.5c1.38 0 2.5 1.12 2.5 2.5s-1.12 2.5-2.5 2.5S9.5 9.38 9.5 8s1.12-2.5 2.5-2.5z"/></svg>
        <span>Items</span>
      </a>
    </nav>

    <!-- ============================================= -->
    <!-- Main Content Area                             -->
    <!-- ============================================= -->
    <main class="app-main" id="router-view">
      <!-- Router injects page content here -->
    </main>

    <!-- ============================================= -->
    <!-- Component Templates                           -->
    <!-- ============================================= -->

    <!-- Home / Dashboard -->
    <template id="home-page-template">
      <section class="page">
        <div class="page__header">
          <h1 class="page__title">List&GO</h1>
        </div>
        <p class="page__subtitle">Your grocery list and meal planner.</p>
        <div class="page-empty">
          <p>Select a tab to get started.</p>
        </div>
      </section>
    </template>

    <!-- Grocery List Tab -->
    <template id="grocery-list-template">
      <section class="page">
        <div class="page__header">
          <h1 class="page__title">Grocery List</h1>
          <button class="btn btn--ghost btn--small" id="grocery-list-archive" aria-label="Archive list">
            Archive
          </button>
        </div>
        <div class="grocery-list-container" id="grocery-list-container">
          <!-- Rendered by grocery-list component -->
        </div>
        <!-- FAB for adding items -->
        <button class="fab" id="add-item-fab" aria-label="Add item">
          <svg width="24" height="24" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </button>
      </section>
    </template>

    <!-- Meal Plan Tab -->
    <template id="meal-plan-template">
      <section class="page">
        <div class="page__header">
          <h1 class="page__title">Meal Plan</h1>
        </div>
        <div class="meal-plan-container" id="meal-plan-container">
          <!-- Rendered by meal-planner component -->
        </div>
      </section>
    </template>

    <!-- Recipes Tab -->
    <template id="recipes-template">
      <section class="page">
        <div class="page__header">
          <h1 class="page__title">Recipes</h1>
          <button class="btn btn--primary btn--small" id="add-recipe-btn" aria-label="Add recipe">
            + New
          </button>
        </div>
        <div class="recipe-library-container" id="recipe-library-container">
          <!-- Rendered by recipe-library component -->
        </div>
      </section>
    </template>

    <!-- Items Library Tab -->
    <template id="items-library-template">
      <section class="page">
        <div class="page__header">
          <h1 class="page__title">Items</h1>
          <button class="btn btn--primary btn--small" id="add-item-btn" aria-label="Add item">
            + New
          </button>
        </div>
        <div class="items-container" id="items-container">
          <!-- Rendered by items-library component -->
        </div>
      </section>
    </template>

    <!-- Settings Tab -->
    <template id="settings-template">
      <section class="page">
        <div class="page__header">
          <h1 class="page__title">Settings</h1>
        </div>
        <div class="settings-container" id="settings-container">
          <!-- Rendered by settings-panel component -->
        </div>
      </section>
    </template>

    <!-- ============================================= -->
    <!-- Bottom Sheet Dialogs                          -->
    <!-- ============================================= -->

    <!-- Add/Edit Item Sheet -->
    <dialog class="bottom-sheet" id="item-editor-sheet">
      <div class="bottom-sheet__content">
        <div class="bottom-sheet__handle"></div>
        <div class="bottom-sheet__header">
          <h2 class="bottom-sheet__title" id="item-editor-title">Add Item</h2>
          <button class="bottom-sheet__close" id="item-editor-close" aria-label="Close">
            <svg width="20" height="20" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          </button>
        </div>
        <div class="bottom-sheet__body" id="item-editor-body">
          <!-- Rendered by item-editor component -->
        </div>
        <div class="bottom-sheet__actions">
          <button class="btn btn--secondary" id="item-editor-cancel">Cancel</button>
          <button class="btn btn--primary" id="item-editor-save">Save</button>
        </div>
      </div>
    </dialog>

    <!-- Add/Edit Recipe Sheet -->
    <dialog class="bottom-sheet" id="recipe-editor-sheet">
      <div class="bottom-sheet__content">
        <div class="bottom-sheet__handle"></div>
        <div class="bottom-sheet__header">
          <h2 class="bottom-sheet__title" id="recipe-editor-title">Add Recipe</h2>
          <button class="bottom-sheet__close" id="recipe-editor-close" aria-label="Close">
            <svg width="20" height="20" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          </button>
        </div>
        <div class="bottom-sheet__body" id="recipe-editor-body">
          <!-- Rendered by recipe-editor component -->
        </div>
        <div class="bottom-sheet__actions">
          <button class="btn btn--secondary" id="recipe-editor-cancel">Cancel</button>
          <button class="btn btn--primary" id="recipe-editor-save">Save</button>
        </div>
      </div>
    </dialog>

    <!-- Ingredient Picker Sheet -->
    <dialog class="bottom-sheet" id="ingredient-picker-sheet">
      <div class="bottom-sheet__content">
        <div class="bottom-sheet__handle"></div>
        <div class="bottom-sheet__header">
          <h2 class="bottom-sheet__title">Select Ingredient</h2>
          <button class="bottom-sheet__close" id="ingredient-picker-close" aria-label="Close">
            <svg width="20" height="20" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          </button>
        </div>
        <div class="bottom-sheet__body" id="ingredient-picker-body">
          <input type="search" class="input input--search" id="ingredient-search" placeholder="Search ingredients..." autocomplete="off" />
          <div id="ingredient-results">
            <!-- Rendered by ingredient-picker component -->
          </div>
        </div>
      </div>
    </dialog>

    <!-- Confirmation Dialog -->
    <dialog class="bottom-sheet" id="confirm-dialog">
      <div class="bottom-sheet__content">
        <div class="bottom-sheet__handle"></div>
        <div class="bottom-sheet__header">
          <h2 class="bottom-sheet__title" id="confirm-title">Confirm</h2>
        </div>
        <div class="bottom-sheet__body" id="confirm-body">
          <p id="confirm-message"></p>
        </div>
        <div class="bottom-sheet__actions">
          <button class="btn btn--secondary" id="confirm-cancel">Cancel</button>
          <button class="btn btn--primary" id="confirm-ok">OK</button>
        </div>
      </div>
    </dialog>
  </div>

  <!-- Global scripts -->
  <script src="https://unpkg.com/dexie@4/dist/dexie.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
