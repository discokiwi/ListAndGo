<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title id="page-title">List&GO – Boodschappen & Maaltijdplanner</title>
  <meta name="description" content="Een local-first, offline-first PWA voor boodschappenlijsten en maaltijdplanning." />
  <meta name="theme-color" content="#f9f9fc" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <!-- Google Material Symbols -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,0..1&display=swap">

  <!-- Design Tokens & Base Styles -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />

  <!-- Component Styles -->
  <link rel="stylesheet" href="css/components/badge.css" />
  <link rel="stylesheet" href="css/components/bottom-sheet.css" />
  <link rel="stylesheet" href="css/components/meal-plan-card.css" />
  <link rel="stylesheet" href="css/components/category-section.css" />
  <link rel="stylesheet" href="css/components/fab.css" />
  <link rel="stylesheet" href="css/components/grocery-row.css" />
  <link rel="stylesheet" href="css/components/inputs.css" />
  <link rel="stylesheet" href="css/components/item-editor.css" />
  <link rel="stylesheet" href="css/components/item-row.css" />
  <link rel="stylesheet" href="css/components/items-library.css" />
  <link rel="stylesheet" href="css/components/pill.css" />
  <link rel="stylesheet" href="css/components/snackbar.css" />
  <link rel="stylesheet" href="css/components/top-bar.css" />
  <link rel="stylesheet" href="css/components/settings-drawer.css" />
  <link rel="stylesheet" href="css/components/confirm-dialog.css" />
  <link rel="stylesheet" href="css/components/content-dialog.css" />
  <link rel="stylesheet" href="css/components/recipe-card.css" />
  <link rel="stylesheet" href="css/components/recipe-details-edit-drawer.css" />
  <link rel="stylesheet" href="css/components/recipe-detail.css" />
  <link rel="stylesheet" href="css/components/recipe-editor.css" />

  <link rel="manifest" href="manifest.webmanifest" />
</head>
<body>
  <div class="app-shell">
    <!-- ============================================= -->
    <!-- Top Bar                                       -->
    <!-- ============================================= -->
    <top-bar class="blur-target"></top-bar>

    <!-- ============================================= -->
    <!-- Bottom Navigation                             -->
    <!-- ============================================= -->
    <nav class="app-nav blur-target" id="app-nav">
      <a href="#/lists" data-route="lists">
        <svg width="24" height="24" viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-1.99.9-1.99 2S15.9 22 17 22s2-.9 2-2-.9-2-2-2zm-8.9-5h7.45c.75 0 1.41-.41 1.75-1.03L21 4.96 19.25 4l-3.7 7H8.53L4.27 2H1v2h2l3.6 7.59-1.35 2.44C4.52 15.37 5.48 17 7 17h12v-2H7l1.1-2z"/></svg>
        <span id="nav-lists-label">Lijsten</span>
      </a>
      <a href="#/plan" data-route="plan">
        <svg width="24" height="24" viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>
        <span id="nav-plan-label">Planning</span>
      </a>
      <a href="#/recipes" data-route="recipes">
        <svg width="24" height="24" viewBox="0 0 24 24"><path d="M8.1 13.34l2.83-2.83L3.91 3.5c-1.56 1.56-1.56 4.09 0 5.66l4.19 4.18zm6.78-1.81c1.53.71 3.68.21 5.27-1.38 1.91-1.91 2.28-4.65.81-6.12-1.46-1.46-4.2-1.1-6.12.81-1.59 1.59-2.09 3.74-1.38 5.27L3.7 19.87l1.41 1.41L12 14.41l6.88 6.88 1.41-1.41L13.41 13l1.47-1.47z"/></svg>
        <span id="nav-recipes-label">Recepten</span>
      </a>
      <a href="#/items" data-route="items">
        <svg width="24" height="24" viewBox="0 -960 960 960"><path d="M640-80q-100 0-170-70t-70-170q0-100 70-170t170-70q100 0 170 70t70 170q0 100-70 170T640-80Zm0-80q66 0 113-47t47-113q0-66-47-113t-113-47q-66 0-113 47t-47 113q0 66 47 113t113 47Zm-480 0q-33 0-56.5-23.5T80-240v-304q0-8 1.5-16t4.5-16l80-184h-6q-17 0-28.5-11.5T120-800v-40q0-17 11.5-28.5T160-880h280q17 0 28.5 11.5T480-840v40q0 17-11.5 28.5T440-760h-6l66 152q-19 10-36 21t-32 25l-84-198h-96l-92 216v304h170q5 21 13.5 41.5T364-160H160Zm480-440q-42 0-71-29t-29-71q0-42 29-71t71-29v200q0-42 29-71t71-29q42 0 71 29t29 71H640Z"/></svg>
        <span id="nav-items-label">Items</span>
      </a>
    </nav>

    <!-- ============================================= -->
    <!-- Main Content Area                             -->
    <!-- ============================================= -->
    <main class="app-main" id="router-view">
      <!-- Router injects page content here -->
    </main>

    <!-- ============================================= -->
    <!-- Component Templates                           -->
    <!-- ============================================= -->

    <!-- Grocery List Tab -->
    <template id="grocery-list-template">
      <section class="page">
        <div class="page__header page__header--hidden">
          <h1 class="page__title" id="grocery-page-title">Boodschappenlijst</h1>
        </div>
        <!-- Search & Action Bar -->
        <div class="search-bar blur-target">
          <div class="search-bar__input-wrapper">
            <svg class="search-bar__icon" width="20" height="20" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <input class="search-bar__input" id="grocery-search" type="search" placeholder="Melk, eieren, brood toevoegen..." autocomplete="off" />
            <div class="search-bar__dropdown" id="grocery-search-dropdown" style="display:none"></div>
          </div>
          <div class="search-bar__pills">
            <button class="pill pill--filled" id="essentials-btn">
              <svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
              <span id="essentials-btn-label">ELKE WEEK</span>
            </button>
            <button class="pill pill--outlined pill--danger" id="clear-all-btn">
              <svg width="16" height="16" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
              <span id="clear-all-btn-label">ALLES WISSEN</span>
            </button>
          </div>
        </div>
        <div class="grocery-list-container" id="grocery-list-container">
          <!-- Rendered by grocery-list component -->
        </div>
      </section>
    </template>

    <!-- Meal Plan Tab -->
    <template id="meal-plan-template">
      <section class="page">
        <div class="plan-header">
          <div class="page__header">
            <h1 class="page__title" id="mealplan-page-title">Maaltijdplanning</h1>
          </div>
          <div class="search-bar__pills">
            <button class="pill pill--outlined pill--danger" id="plan-clear-all-btn">
              <svg width="16" height="16" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
              <span id="plan-clear-all-label">ALLES WISSEN</span>
            </button>
          </div>
        </div>
        <div class="meal-plan-card-list" id="meal-plan-card-list">
          <!-- Rendered by meal-planner component -->
        </div>
      </section>
    </template>

    <!-- Recipes Tab -->
    <template id="recipes-template">
      <section class="page">
        <div class="page__header page__header--hidden">
          <h1 class="page__title" id="recipes-page-title">Recepten</h1>
          <button class="btn btn--primary btn--small" id="add-recipe-btn" aria-label="Recept toevoegen">
            + Nieuw
          </button>
        </div>
        <div class="recipe-library-container" id="recipe-library-container">
          <!-- Rendered by recipe-library component -->
        </div>
        <button class="recipe-fab" id="recipe-add-fab" aria-label="Recept toevoegen">
          <svg width="24" height="24" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </button>
      </section>
    </template>

    <!-- Items Library Tab (Inventory Manager View) -->
    <template id="items-library-template">
      <section class="page">
        <div class="page__header page__header--hidden">
          <h1 class="page__title" id="items-page-title">Itemlijst</h1>
        </div>
        <!-- Search Section (same design as grocery list) -->
        <div class="search-bar">
          <div class="search-bar__input-wrapper">
            <svg class="search-bar__icon" width="20" height="20" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <input class="search-bar__input" type="text" id="items-search-input" placeholder="Ingrediënten of categorieën doorzoeken..." autocomplete="off" />
          </div>
          <!-- Filter Pills -- single Essentials toggle (same design as grocery list's EVERY WEEK) -->
          <div class="search-bar__pills" id="items-filter-pills">
            <button class="pill pill--outlined" id="items-essentials-btn">
              <svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
              <span id="items-essentials-label">ESSENTIEEL</span>
            </button>
          </div>
        </div>
        <div class="items-sections" id="items-container">
          <!-- Rendered by items-library component -->
        </div>
        <!-- Toast notification -->
        <div class="items-toast" id="items-toast">Toegevoegd aan Boodschappenlijst</div>
        <!-- FAB for adding items -->
        <button class="fab" id="add-item-btn" aria-label="Item toevoegen">
          <svg width="24" height="24" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </button>
      </section>
    </template>

    <!-- Settings Tab -->
    <template id="settings-template">
      <section class="page">
        <div class="page__header page__header--hidden">
          <h1 class="page__title">Instellingen</h1>
        </div>
        <div class="settings-container" id="settings-container">
          <!-- Rendered by settings-panel component -->
        </div>
      </section>
    </template>

    <!-- ============================================= -->
    <!-- Side Drawer Dialogs                           -->
    <!-- ============================================= -->

    <!-- Add/Edit Item Drawer -->
    <div class="side-drawer" id="item-editor-sheet" style="display:none">
      <div class="side-drawer__backdrop" id="item-editor-overlay"></div>
      <div class="side-drawer__content">
        <div class="side-drawer__header">
          <div class="side-drawer__header-left">
            <button class="side-drawer__back" id="item-editor-close" aria-label="Sluiten">
              <svg width="24" height="24" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </button>
            <h2 class="side-drawer__title" id="item-editor-title">Item Bewerken</h2>
          </div>
          <button class="side-drawer__delete" id="item-editor-delete-btn" aria-label="Item verwijderen">
            ITEM VERWIJDEREN
          </button>
        </div>

        <div class="side-drawer__body" id="item-editor-body">
          <!-- Rendered by item-editor component -->
        </div>

        <div class="side-drawer__footer">
          <button class="side-drawer__btn side-drawer__btn--secondary" id="item-editor-cancel">Annuleren</button>
          <button class="side-drawer__btn side-drawer__btn--primary" id="item-editor-save">Wijzigingen Opslaan</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Recipe Editor Component -->
  <recipe-editor></recipe-editor>

  <!-- Recipe Detail Component -->
  <recipe-detail></recipe-detail>

  <!-- Settings Drawer Component -->
  <settings-panel></settings-panel>

  <!-- Global Snackbar Component -->
  <app-snackbar></app-snackbar>

  <!-- Global scripts -->
  <script src="js/vendor/dexie.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
