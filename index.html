<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>List&GO – Grocery & Meal Planner</title>
  <meta name="description" content="A local‑first, offline‑first PWA for managing grocery lists and meal planning." />
  <link rel="stylesheet" href="index.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>
  <!-- Component Templates -->
  <template id="app-nav-template">
    <nav class="app-nav">
      <button data-link="home">Home</button>
      <button data-link="lists">Lists</button>
      <button data-link="recipes">Recipes</button>
      <button data-link="settings">Settings</button>
    </nav>
  </template>

  <template id="home-page-template">
    <section class="home-page">
      <h1>Welcome to List&GO</h1>
      <p>Manage your grocery lists and plan meals effortlessly.</p>
    </section>
  </template>

  <!-- Application root -->
  <app-nav></app-nav>
  <main id="router-view"></main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
