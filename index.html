<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>List&GO – Grocery & Meal Planner</title>
  <meta name="description" content="A local‑first, offline‑first PWA for managing grocery lists and meal planning." />
  <meta name="theme-color" content="#f9f9fc" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <!-- Design Tokens & Base Styles -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />

  <!-- Component Styles -->
  <link rel="stylesheet" href="css/components/top-bar.css" />
  <link rel="stylesheet" href="css/components/badge.css" />
  <link rel="stylesheet" href="css/components/bottom-sheet.css" />
  <link rel="stylesheet" href="css/components/category-section.css" />
  <link rel="stylesheet" href="css/components/fab.css" />
  <link rel="stylesheet" href="css/components/inputs.css" />
  <link rel="stylesheet" href="css/components/grocery-row.css" />
  <link rel="stylesheet" href="css/components/items-library.css" />
  <link rel="stylesheet" href="css/components/item-editor.css" />

  <link rel="manifest" href="manifest.webmanifest" />
</head>
<body>
  <div class="app-shell">
    <!-- ============================================= -->
    <!-- Top Bar                                       -->
    <!-- ============================================= -->
    <top-bar class="blur-target"></top-bar>

    <!-- ============================================= -->
    <!-- Bottom Navigation                             -->
    <!-- ============================================= -->
    <nav class="app-nav blur-target" id="app-nav">
      <a href="#/lists" data-route="lists">
        <svg width="24" height="24" viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-1.99.9-1.99 2S15.9 22 17 22s2-.9 2-2-.9-2-2-2zm-8.9-5h7.45c.75 0 1.41-.41 1.75-1.03L21 4.96 19.25 4l-3.7 7H8.53L4.27 2H1v2h2l3.6 7.59-1.35 2.44C4.52 15.37 5.48 17 7 17h12v-2H7l1.1-2z"/></svg>
        <span>Lists</span>
      </a>
      <a href="#/plan" data-route="plan">
        <svg width="24" height="24" viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>
        <span>Plan</span>
      </a>
      <a href="#/recipes" data-route="recipes">
        <svg width="24" height="24" viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9h-4v4h-2v-4H9V9h4V5h2v4h4v2z"/></svg>
        <span>Recipes</span>
      </a>
      <a href="#/items" data-route="items">
        <svg width="24" height="24" viewBox="0 0 24 24"><path d="M12 22c4.97 0 9-4.03 9-9-4.97 0-9 4.03-9 9zM5.6 10.25c0 1.38 1.12 2.5 2.5 2.5.53 0 1.01-.16 1.42-.44l-.02.19c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5l-.02-.19c.4.28.89.44 1.42.44 1.38 0 2.5-1.12 2.5-2.5 0-1-.59-1.85-1.43-2.25.84-.4 1.43-1.25 1.43-2.25 0-1.38-1.12-2.5-2.5-2.5-.53 0-1.01.16-1.42.44l.02-.19C14.5 2.12 13.38 1 12 1S9.5 2.12 9.5 3.5l.02.19c-.4-.28-.89-.44-1.42-.44-1.38 0-2.5 1.12-2.5 2.5 0 1 .59 1.85 1.43 2.25-.84.4-1.43 1.25-1.43 2.25zM12 5.5c1.38 0 2.5 1.12 2.5 2.5s-1.12 2.5-2.5 2.5S9.5 9.38 9.5 8s1.12-2.5 2.5-2.5z"/></svg>
        <span>Items</span>
      </a>
    </nav>

    <!-- ============================================= -->
    <!-- Main Content Area                             -->
    <!-- ============================================= -->
    <main class="app-main" id="router-view">
      <!-- Router injects page content here -->
    </main>

    <!-- ============================================= -->
    <!-- Component Templates                           -->
    <!-- ============================================= -->

    <!-- Grocery List Tab -->
    <template id="grocery-list-template">
      <section class="page">
        <div class="page__header page__header--hidden">
          <h1 class="page__title">Grocery List</h1>
        </div>
        <!-- Search & Action Bar -->
        <div class="search-bar blur-target">
          <div class="search-bar__input-wrapper">
            <svg class="search-bar__icon" width="20" height="20" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <input class="search-bar__input" id="grocery-search" type="search" placeholder="Add milk, eggs, bread..." autocomplete="off" />
            <div class="search-bar__dropdown" id="grocery-search-dropdown" style="display:none"></div>
          </div>
          <div class="search-bar__pills">
            <button class="pill pill--filled" id="essentials-btn">
              <svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
              EVERY WEEK
            </button>
            <button class="pill pill--outlined pill--danger" id="clear-all-btn">
              <svg width="16" height="16" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
              CLEAR ALL
            </button>
          </div>
        </div>
        <div class="grocery-list-container" id="grocery-list-container">
          <!-- Rendered by grocery-list component -->
        </div>
      </section>
    </template>

    <!-- Meal Plan Tab -->
    <template id="meal-plan-template">
      <section class="page">
        <div class="page__header page__header--hidden">
          <h1 class="page__title">Meal Plan</h1>
        </div>
        <div class="meal-plan-container" id="meal-plan-container">
          <!-- Rendered by meal-planner component -->
        </div>
      </section>
    </template>

    <!-- Recipes Tab -->
    <template id="recipes-template">
      <section class="page">
        <div class="page__header page__header--hidden">
          <h1 class="page__title">Recipes</h1>
          <button class="btn btn--primary btn--small" id="add-recipe-btn" aria-label="Add recipe">
            + New
          </button>
        </div>
        <div class="recipe-library-container" id="recipe-library-container">
          <!-- Rendered by recipe-library component -->
        </div>
      </section>
    </template>

    <!-- Items Library Tab (Inventory Manager View) -->
    <template id="items-library-template">
      <section class="page">
        <div class="page__header page__header--hidden">
          <h1 class="page__title">Item list</h1>
        </div>
        <!-- Search Section -->
        <section class="items-search-section">
          <div class="items-search-wrapper">
            <span class="items-search-icon">
              <svg width="20" height="20" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </span>
            <input class="items-search-input" type="text" id="items-search-input" placeholder="Search ingredients or categories..." autocomplete="off" />
          </div>
          <!-- Filter Pills -->
          <div class="items-filter-pills" id="items-filter-pills">
            <button class="items-filter-pill items-filter-pill--active" data-filter="all">
              <svg viewBox="0 0 24 24"><path d="M12 22c4.97 0 9-4.03 9-9-4.97 0-9 4.03-9 9zM5.6 10.25c0 1.38 1.12 2.5 2.5 2.5.53 0 1.01-.16 1.42-.44l-.02.19c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5l-.02-.19c.4.28.89.44 1.42.44 1.38 0 2.5-1.12 2.5-2.5 0-1-.59-1.85-1.43-2.25.84-.4 1.43-1.25 1.43-2.25 0-1.38-1.12-2.5-2.5-2.5-.53 0-1.01.16-1.42.44l.02-.19C14.5 2.12 13.38 1 12 1S9.5 2.12 9.5 3.5l.02.19c-.4-.28-.89-.44-1.42-.44-1.38 0-2.5 1.12-2.5 2.5 0 1 .59 1.85 1.43 2.25-.84.4-1.43 1.25-1.43 2.25zM12 5.5c1.38 0 2.5 1.12 2.5 2.5s-1.12 2.5-2.5 2.5S9.5 9.38 9.5 8s1.12-2.5 2.5-2.5z"/></svg>
              All Items
            </button>
            <button class="items-filter-pill" data-filter="essential">
              <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
              Essentials
            </button>
          </div>
        </section>
        <div class="items-sections" id="items-container">
          <!-- Rendered by items-library component -->
        </div>
        <!-- Toast notification -->
        <div class="items-toast" id="items-toast">Added to Grocery List</div>
        <!-- FAB for adding items -->
        <button class="fab" id="add-item-btn" aria-label="Add item">
          <svg width="24" height="24" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </button>
      </section>
    </template>

    <!-- Settings Tab -->
    <template id="settings-template">
      <section class="page">
        <div class="page__header page__header--hidden">
          <h1 class="page__title">Settings</h1>
        </div>
        <div class="settings-container" id="settings-container">
          <!-- Rendered by settings-panel component -->
        </div>
      </section>
    </template>

    <!-- ============================================= -->
    <!-- Side Drawer Dialogs                           -->
    <!-- ============================================= -->

    <!-- Add/Edit Item Drawer (Stitch "Edit Item - Inventory Manager" side drawer) -->
    <!-- Uses a div rather than <dialog> because Chromium's top-layer layout for
         showModal() doesn't support display:flex + justify-content:flex-end.
         This div is shown/hidden via inline styles. -->
    <div class="side-drawer" id="item-editor-sheet" style="display:none">
      <div class="side-drawer__backdrop" id="item-editor-overlay"></div>
      <div class="side-drawer__content">
        <div class="side-drawer__header">
          <div class="side-drawer__header-left">
            <button class="side-drawer__back" id="item-editor-close" aria-label="Close">
              <svg width="24" height="24" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </button>
            <h2 class="side-drawer__title" id="item-editor-title">Edit Item</h2>
          </div>
          <button class="side-drawer__delete" id="item-editor-delete-btn" aria-label="Delete item">
            DELETE ITEM
          </button>
        </div>

        <div class="side-drawer__body" id="item-editor-body">
          <!-- Rendered by item-editor component -->
        </div>

        <div class="side-drawer__footer">
          <button class="side-drawer__btn side-drawer__btn--secondary" id="item-editor-cancel">Cancel</button>
          <button class="side-drawer__btn side-drawer__btn--primary" id="item-editor-save">Save Changes</button>
        </div>
      </div>
    </div>

    <!-- Add/Edit Recipe Sheet -->
    <dialog class="bottom-sheet" id="recipe-editor-sheet">
      <div class="bottom-sheet__content">
        <div class="bottom-sheet__handle"></div>
        <div class="bottom-sheet__header">
          <h2 class="bottom-sheet__title" id="recipe-editor-title">Add Recipe</h2>
          <button class="bottom-sheet__close" id="recipe-editor-close" aria-label="Close">
            <svg width="20" height="20" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          </button>
        </div>
        <div class="bottom-sheet__body" id="recipe-editor-body">
          <!-- Rendered by recipe-editor component -->
        </div>
        <div class="bottom-sheet__actions">
          <button class="btn btn--secondary" id="recipe-editor-cancel">Cancel</button>
          <button class="btn btn--primary" id="recipe-editor-save">Save</button>
        </div>
      </div>
    </dialog>

    <!-- Ingredient Picker Sheet -->
    <dialog class="bottom-sheet" id="ingredient-picker-sheet">
      <div class="bottom-sheet__content">
        <div class="bottom-sheet__handle"></div>
        <div class="bottom-sheet__header">
          <h2 class="bottom-sheet__title">Select Ingredient</h2>
          <button class="bottom-sheet__close" id="ingredient-picker-close" aria-label="Close">
            <svg width="20" height="20" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          </button>
        </div>
        <div class="bottom-sheet__body" id="ingredient-picker-body">
          <input type="search" class="input input--search" id="ingredient-search" placeholder="Search ingredients..." autocomplete="off" />
          <div id="ingredient-results">
            <!-- Rendered by ingredient-picker component -->
          </div>
        </div>
      </div>
    </dialog>

    <!-- Confirmation Dialog -->
    <dialog class="bottom-sheet" id="confirm-dialog">
      <div class="bottom-sheet__content">
        <div class="bottom-sheet__handle"></div>
        <div class="bottom-sheet__header">
          <h2 class="bottom-sheet__title" id="confirm-title">Confirm</h2>
        </div>
        <div class="bottom-sheet__body" id="confirm-body">
          <p id="confirm-message"></p>
        </div>
        <div class="bottom-sheet__actions">
          <button class="btn btn--secondary" id="confirm-cancel">Cancel</button>
          <button class="btn btn--primary" id="confirm-ok">OK</button>
        </div>
      </div>
    </dialog>
  </div>

  <!-- Global scripts -->
  <!-- Dexie (IndexedDB wrapper) vendored locally for offline-first resilience -->
  <script src="js/vendor/dexie.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
